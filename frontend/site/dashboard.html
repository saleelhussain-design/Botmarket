<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotMarket | Command Center</title>
    <link rel="stylesheet" href="assets/index-nYuAEd3z.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; color: #333; margin: 0; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: #001f3f; color: white; padding: 2rem 1rem; position: fixed; }
        .main-content { margin-left: 260px; padding: 2rem; width: calc(100% - 260px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #666; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 2rem; font-weight: bold; color: #003366; }
        
        .section { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .section h2 { margin-top: 0; color: #003366; border-bottom: 2px solid #eee; padding-bottom: 1rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid #eee; }
        th { color: #666; font-weight: 600; }
        
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .status-online { background: #e6fffa; color: #2c7a7b; }
        .status-offline { background: #fff5f5; color: #c53030; }
        
        .llm-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid #eee; }
        .llm-control { display: flex; gap: 10px; align-items: center; }
        select { padding: 8px; border-radius: 6px; border: 1px solid #ccc; }
        
        .btn { padding: 8px 16px; background: #003366; color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #0055aa; }
        .nav-item { padding: 12px; color: #ccc; text-decoration: none; display: block; border-radius: 8px; margin-bottom: 10px; }
        .nav-item.active { background: #003366; color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>BotMarket</h2>
        <nav style="margin-top: 2rem;">
            <a href="#" class="nav-item active">Dashboard</a>
            <a href="/wizard.html" class="nav-item">Bot Factory</a>
            <a href="#" class="nav-item">Marketing AI</a>
            <a href="#" class="nav-item">Sales AI</a>
            <a href="#" class="nav-item">Settings</a>
        </nav>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h1>Command Center</h1>
            <div id="system-time"></div>
        </div>
        
        <div class="stats-grid" id="stats">
            <div class="stat-card"><h3>Total Bots</h3><p id="stat-total">-</p></div>
            <div class="stat-card"><h3>Active Workers</h3><p id="stat-active">-</p></div>
            <div class="stat-card"><h3>System Health</h3><p id="stat-health">-</p></div>
            <div class="stat-card"><h3>API Latency</h3><p id="stat-latency">-- ms</p></div>
        </div>
        
        <div class="section">
            <h2>🤖 Active Bot Registry</h2>
            <table id="bot-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
        
        <div class="section">
            <h2>🧠 LLM Mapping & Control</h2>
            <div id="llm-mappings">
                <!-- Loaded via JS -->
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = 'http://192.168.1.222:3001/api';

        async function updateDashboard() {
            try {
                // 1. Update Stats
                const overviewRes = await fetch(`${API_BASE_URL}/dashboard/overview`);
                const overview = await overviewRes.json();
                document.getElementById('stat-total').innerText = overview.stats.totalPersonas;
                document.getElementById('stat-active').innerText = overview.stats.activeWorkers;
                document.getElementById('stat-health').innerText = overview.stats.systemStatus;

                // 2. Update Bot Table
                const botsRes = await fetch(`${API_BASE_URL}/dashboard/bots`);
                const bots = await botsRes.json();
                const tableBody = document.querySelector('#bot-table tbody');
                tableBody.innerHTML = '';
                bots.forEach(bot => {
                    tableBody.innerHTML += `
                        <tr>
                            <td>${bot.id}</td>
                            <td>${bot.name}</td>
                            <td>${bot.role}</td>
                            <td><span class="status-pill ${bot.status === 'Online' ? 'status-online' : 'status-offline'}">${bot.status}</span></td>
                            <td><button class="btn" onclick="alert('Opening log: ${bot.logPath}')">View Logs</button></td>
                        </tr>
                    `;
                });

                // 3. Update LLM Mapping
                const llmRes = await fetch(`${API_BASE_URL}/dashboard/llm-config`);
                const llm = await llmRes.json();
                const llmContainer = document.getElementById('llm-mappings');
                llmContainer.innerHTML = '';
                llm.mappings.forEach(map => {
                    llmContainer.innerHTML += `
                        <div class="llm-row">
                            <span><strong>Bot #${map.personaId}</strong></span>
                            <div class="llm-control">
                                <select onchange="updateLLM(${map.personaId}, this.value)">
                                    <option value="gpt-4-turbo" ${map.model === 'gpt-4-turbo' ? 'selected' : ''}>GPT-4 Turbo</option>
                                    <option value="claude-3-opus" ${map.model === 'claude-3-opus' ? 'selected' : ''}>Claude 3 Opus</option>
                                    <option value="llama3-ollama" ${map.model === 'llama3-ollama' ? 'selected' : ''}>Llama 3 (Ollama)</option>
                                </select>
                                <span style="font-size: 0.8rem; color: #666;">Temp: ${map.temperature}</span>
                            </div>
                        </div>
                    `;
                });

            } catch (e) {
                console.error('Dashboard Update Error:', e);
            }
        }

        async function updateLLM(personaId, model) {
            try {
                const res = await fetch(`${API_BASE_URL}/dashboard/llm-config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ personaId, model })
                });
                if (res.ok) {
                    alert(`Bot #${personaId} switched to ${model}`);
                } else {
                    alert('Failed to update LLM mapping');
                }
            } catch (e) {
                console.error('LLM Update Error:', e);
                alert('Network Error. Check backend connection.');
            }
        }

        // Initial Load
        updateDashboard();
        setInterval(updateDashboard, 5000);
        
        // Clock
        setInterval(() => {
            document.getElementById('system-time').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
