<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotMarket | AI Workforce Wizard</title>
    <link rel="stylesheet" href="assets/index-nYuAEd3z.css">
    <style>
        body { color: #000; }

        .wizard-container { max-width: 600px; margin: 100px auto; padding: 2rem; font-family: sans-serif; border: 1px solid #ddd; border-radius: 12px; background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .step { display: none; }
        .step.active { display: block; }
        .progress-bar { display: flex; justify-content: space-between; margin-bottom: 2rem; }
        .progress-step { width: 30%; height: 8px; background: #eee; border-radius: 4px; transition: background 0.3s; }
        .progress-step.active { background: #003366; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; }
        .btn { padding: 0.75rem 1.5rem; background: #003366; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        .btn:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="wizard-container">
        <div class="progress-bar">
            <div class="progress-step active" id="p1"></div>
            <div class="progress-step" id="p2"></div>
            <div class="progress-step" id="p3"></div>
        </div>

        <form id="wizardForm">
            <!-- Step 1: Basic Info -->
            <div class="step active" id="step1">
                <h2>Step 1: Basic Identity</h2>
                <div class="form-group">
                    <label>Agent Name</label>
                    <input type="text" id="name" placeholder="e.g. Sarah the Assistant" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" id="role" placeholder="e.g. Salon Receptionist" required>
                </div>
                <div class="form-group">
                    <label>Tone</label>
                    <select id="tone">
                        <option value="professional">Professional</option>
                        <option value="friendly">Friendly</option>
                        <option value="formal">Formal</option>
                        <option value="casual">Casual</option>
                        <option value="empathetic">Empathetic</option>
                    </select>
                </div>
                <button type="button" class="btn" onclick="nextStep(2)">Next</button>
            </div>
        
            <!-- Step 2: Knowledge -->
            <div class="step" id="step2">
                <h2>Step 2: Knowledge Base</h2>
                <p>Upload a PDF or Text file to train your agent.</p>
                <div class="form-group">
                    <input type="file" id="knowledgeFile" accept=".pdf,.txt">
                </div>
                <button type="button" class="btn" onclick="nextStep(1)">Back</button>
                <button type="button" class="btn" onclick="nextStep(3)">Next</button>
            </div>
        
            <!-- Step 3: Integrations -->
            <div class="step" id="step3">
                <h2>Step 3: Connect Tools</h2>
                <div class="form-group">
                    <label><input type="checkbox" id="vapi"> Enable Voice (Vapi)</label>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="whatsapp"> Enable WhatsApp</label>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="calendar"> Enable Calendar</label>
                </div>
                <button type="button" class="btn" onclick="nextStep(2)">Back</button>
                <button type="button" class="btn" onclick="finishWizard()">Deploy Agent</button>
            </div>
        </form>
    </div>
    
    <script>
        const API_BASE_URL = 'http://192.168.1.222:3001/api';
        let currentPersonaId = null;
    
        async function nextStep(step) {
            if (step === 2) {
                const res = await fetch(`${API_BASE_URL}/wizard/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        role: document.getElementById('role').value,
                        tone: document.getElementById('tone').value
                    })
                });
                const data = await res.json();
                if (data.personaId) {
                    currentPersonaId = data.personaId;
                    showStep(2);
                } else {
                    alert('Error creating persona: ' + (data.message || 'Unknown error'));
                }
            } else if (step === 3) {
                // Knowledge upload simulation
                const fileInput = document.getElementById('knowledgeFile');
                if (fileInput.files.length > 0) {
                    // For this demo, we send the filename as path since backend is mock
                    await fetch(`${API_BASE_URL}/wizard/${currentPersonaId}/knowledge`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filePath: fileInput.files[0].name })
                    });
                }
                showStep(3);
            } else {
                showStep(step);
            }
        }
    
        function showStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            document.querySelectorAll('.progress-step').forEach((s, i) => {
                s.classList.toggle('active', i < step);
            });
        }
    
        async function finishWizard() {
            const res = await fetch(`${API_BASE_URL}/wizard/${currentPersonaId}/integrations`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    vapi: document.getElementById('vapi').checked,
                    whatsapp: document.getElementById('whatsapp').checked,
                    calendar: document.getElementById('calendar').checked
                })
            });
            if (res.ok) {
                alert('Agent Deployed Successfully!');
                window.location.href = '/';
            } else {
                alert('Deployment failed');
            }
        }
    </script>
</body>
</html>
